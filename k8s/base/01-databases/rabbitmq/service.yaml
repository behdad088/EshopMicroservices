apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: eshop-microservices
spec:
  clusterIP: None
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      name: amqp
    - port: 15672
      name: management
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: eshop-microservices
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
      name: amqp
    - port: 15672
      targetPort: 15672
      name: management
