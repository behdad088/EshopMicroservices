apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: order-command-db
  namespace: eshop-microservices
spec:
  serviceName: order-command-db-headless
  replicas: 1
  selector:
    matchLabels:
      app: order-command-db
  template:
    metadata:
      labels:
        app: order-command-db
    spec:
      serviceAccountName: sa-databases
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: OrderCommandDb
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: order-command-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-command-db-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
