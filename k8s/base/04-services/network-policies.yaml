# Default deny-all ingress in namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: eshop-microservices
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Default deny-all egress in namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: eshop-microservices
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# Allow DNS resolution for all pods (required for service discovery)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: eshop-microservices
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# catalog-api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netpol-catalog-api
  namespace: eshop-microservices
spec:
  podSelector:
    matchLabels:
      app: catalog-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: catalog-db
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: elasticsearch
      ports:
        - port: 9200
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
        - port: 4318
    - to:
        - podSelector:
            matchLabels:
              app: identity-api
      ports:
        - port: 8081
---
