# OTEL Collector
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netpol-otel-collector
  namespace: eshop-microservices
spec:
  podSelector:
    matchLabels:
      app: otel-collector
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 4317
        - port: 4318
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8889
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: jaeger
      ports:
        - port: 4317
    - to:
        - podSelector:
            matchLabels:
              app: loki
      ports:
        - port: 3100
    - to:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 9090
---
# Observability UIs — allow ingress from ingress-nginx
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netpol-observability-uis
  namespace: eshop-microservices
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [kibana, jaeger, grafana, prometheus, mailpit]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
