# identity-api — allow all pods to reach it (for JWT validation)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netpol-identity-api
  namespace: eshop-microservices
spec:
  podSelector:
    matchLabels:
      app: identity-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8081
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: identity-db
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: mailpit
      ports:
        - port: 1025
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
        - port: 4318
---
