apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: eshop-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: sa-api-gateway
      containers:
        - name: api-gateway
          image: api.gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: api-gateway-cm
          env:
            - name: ASPNETCORE_Kestrel__Certificates__Default__Password
              valueFrom:
                secretKeyRef:
                  name: cert-password
                  key: CERT_PASSWORD
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: https
          livenessProbe:
            httpGet:
              path: /hc
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /hc
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: certs
              mountPath: /app/certificates
              readOnly: true
      volumes:
        - name: certs
          projected:
            sources:
              - secret:
                  name: cert-api-gateway
              - configMap:
                  name: cert-ca
