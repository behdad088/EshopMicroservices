apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-command-api
  namespace: eshop-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-command-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-command-api
    spec:
      serviceAccountName: sa-order-command-api
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z order-command-db 5432; do echo waiting for order-command-db; sleep 2; done']
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done']
      containers:
        - name: order-command-api
          image: order.command.api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: order-command-api-cm
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: order-command-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-command-db-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__Database
              value: "Server=order-command-db;Database=OrderCommandDb;User Id=$(DB_USER);Password=$(DB_PASSWORD)"
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USERNAME
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASSWORD
            - name: ASPNETCORE_Kestrel__Certificates__Default__Password
              valueFrom:
                secretKeyRef:
                  name: cert-password
                  key: CERT_PASSWORD
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: https
          livenessProbe:
            httpGet:
              path: /hc
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /hc
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: certs
              mountPath: /app/certificates
              readOnly: true
      volumes:
        - name: certs
          projected:
            sources:
              - secret:
                  name: cert-order-command-api
              - configMap:
                  name: cert-ca
