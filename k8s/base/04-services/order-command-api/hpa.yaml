apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-command-api-hpa
  namespace: eshop-microservices
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-command-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
