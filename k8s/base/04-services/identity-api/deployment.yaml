apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: eshop-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      serviceAccountName: sa-identity-api
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z identity-db 5432; do echo waiting for identity-db; sleep 2; done']
      containers:
        - name: identity-api
          image: identity.api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: identity-api-cm
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: identity-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-db-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__IdentityDB
              value: "Host=identity-db;Port=5432;Database=IdentityDb;User Id=$(DB_USER);Password=$(DB_PASSWORD)"
            - name: EmailService__authentication_key
              valueFrom:
                secretKeyRef:
                  name: identity-secret
                  key: EmailService__authentication_key
            - name: ASPNETCORE_Kestrel__Certificates__Default__Password
              valueFrom:
                secretKeyRef:
                  name: cert-password
                  key: CERT_PASSWORD
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: https
          livenessProbe:
            httpGet:
              path: /hc
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /hc
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: certs
              mountPath: /app/certificates
              readOnly: true
      volumes:
        - name: certs
          projected:
            sources:
              - secret:
                  name: cert-identity-api
              - configMap:
                  name: cert-ca
