# ── ServiceAccounts ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-databases
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-observability
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-catalog-api
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-basket-api
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-discount-grpc
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-identity-api
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-order-command-api
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-order-query-api
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-order-query-eventprocessor
  namespace: eshop-microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-api-gateway
  namespace: eshop-microservices
---
# ── Roles ─────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: role-observability
  namespace: eshop-microservices
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: role-app-readonly
  namespace: eshop-microservices
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get"]
---
# ── RoleBindings ──────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-observability
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-observability
subjects:
  - kind: ServiceAccount
    name: sa-observability
    namespace: eshop-microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-catalog-api
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-app-readonly
subjects:
  - kind: ServiceAccount
    name: sa-catalog-api
    namespace: eshop-microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-basket-api
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-app-readonly
subjects:
  - kind: ServiceAccount
    name: sa-basket-api
    namespace: eshop-microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-discount-grpc
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-app-readonly
subjects:
  - kind: ServiceAccount
    name: sa-discount-grpc
    namespace: eshop-microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-identity-api
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-app-readonly
subjects:
  - kind: ServiceAccount
    name: sa-identity-api
    namespace: eshop-microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-order-command-api
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-app-readonly
subjects:
  - kind: ServiceAccount
    name: sa-order-command-api
    namespace: eshop-microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-order-query-api
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-app-readonly
subjects:
  - kind: ServiceAccount
    name: sa-order-query-api
    namespace: eshop-microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-order-query-eventprocessor
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-app-readonly
subjects:
  - kind: ServiceAccount
    name: sa-order-query-eventprocessor
    namespace: eshop-microservices
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-api-gateway
  namespace: eshop-microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-app-readonly
subjects:
  - kind: ServiceAccount
    name: sa-api-gateway
    namespace: eshop-microservices
