apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: eshop-microservices
spec:
  selector:
    app: jaeger
  ports:
    - port: 16686
      targetPort: 16686
      name: ui
    - port: 14268
      targetPort: 14268
      name: collector-http
    - port: 14269
      targetPort: 14269
      name: admin
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 6831
      targetPort: 6831
      protocol: UDP
      name: agent-udp
