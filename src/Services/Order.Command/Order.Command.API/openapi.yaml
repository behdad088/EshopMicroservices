openapi: 3.0.0
info:
  title: eshop Order Command API
  version: 1.0.0
  description: |
    The **Order Command** microservice handles all write-side operations for orders
    in the eshop platform (CQRS command side). It publishes domain events to
    RabbitMQ for eventual consistency with the Order Query service.

    ## Authentication
    All endpoints require a Bearer JWT issued by the IdentityServer at
    `https://localhost:5007`. The token must include the `orders_command` audience
    and the relevant `permissions` claim for the operation being called.

    Obtain a token via:
    - **Postman UI** — Authorization Code + PKCE with `postman-client`
    - **curl** — Password grant with `postman-client-password`

    ## Authorization — Permissions Model
    Authorization is claims-based. The JWT must contain a `permissions` claim
    matching the required policy. Permissions are assigned per role:

    | Permission | admin | customer |
    |---|:---:|:---:|
    | `orders_command:order:create` | | ✓ |
    | `orders_command:order:delete` | ✓ | |
    | `orders_command:order:get` | ✓ | ✓ |
    | `orders_command:order:all` | ✓ | |
    | `orders_command:order:all-by-customer-id` | ✓ | ✓ |
    | `orders_command:order:all-by-order-name` | ✓ | |
    | `orders_command:order:update` | ✓ | ✓ |

    ## Infrastructure
    - **Database:** PostgreSQL (`OrderDb`) via Entity Framework Core
    - **Message Broker:** RabbitMQ (domain events published on order state changes)
    - **Observability:** OpenTelemetry traces + Serilog → Elasticsearch
    - **Base path:** `/api/v1/` (route group in `Program.cs`)

servers:
  - url: http://localhost:5175
    description: Local development
  - url: http://localhost:8080
    description: Docker container (HTTP)
  - url: https://localhost:8081
    description: Docker container (HTTPS)

tags:
  - name: Orders
    description: Order write and read operations
  - name: Health
    description: Health check endpoints (no auth required)

security:
  - BearerAuth: []

paths:

  # ── Create / Update / Delete / Get a specific order ────────────────────────

  /api/v1/customers/{customer_id}/orders/{order_id}:
    post:
      tags: [Orders]
      summary: Create Order
      description: |
        Creates a new order. Both `customer_id` and `order_id` are route
        parameters — the caller supplies the order ID (ULID or UUID).

        **Required permission:** `orders_command:order:create`
        **Allowed roles:** `customer` only

        The `customer_id` is validated against the JWT `sub` claim — customers
        can only create orders for themselves. Admins cannot create orders.

        On success, publishes an `OrderCreated` domain event to RabbitMQ and
        returns `201 Created` with a `Location` header.

        Returns `400 Bad Request` if an order with the same `order_id` already
        exists (`DuplicatedOrderId` result).
      parameters:
        - $ref: '#/components/parameters/customer_id'
        - $ref: '#/components/parameters/order_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              order_name: "Alice's Order #1"
              shipping_address:
                firstname: "Alice"
                lastname: "Smith"
                email_address: "AliceSmith@email.com"
                address_line: "Medicinaregatan 20"
                country: "Sweden"
                state: "Vastra Gotaland"
                zip_code: "41390"
              billing_address:
                firstname: "Alice"
                lastname: "Smith"
                email_address: "AliceSmith@email.com"
                address_line: "Medicinaregatan 20"
                country: "Sweden"
                state: "Vastra Gotaland"
                zip_code: "41390"
              payment:
                card_name: "Alice Smith"
                card_number: "XXXXXXXXXXXX1881"
                expiration: "12/24"
                cvv: "123"
                payment_method: 1
              order_items:
                - product_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  quantity: 2
                  price: 79.99
      responses:
        '201':
          description: Order created successfully
          headers:
            Location:
              description: >-
                URL of the created order:
                `customers/{customer_id}/orders/{order_id}`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
              example:
                order_id: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      tags: [Orders]
      summary: Update Order
      description: |
        Updates an existing order. All body fields are optional — only provided
        fields are applied.

        **Required permission:** `orders_command:order:update`
        **Allowed roles:** `admin`, `customer`

        Customers can only update their own orders (`customer_id` must match
        JWT `sub` claim). On success, publishes an `OrderUpdated` domain event.

        **Optimistic concurrency:** Requires `If-Match: W/"<version>"` header
        matching the current ETag (obtained from `GET` on the same order).
        Returns `412 Precondition Failed` if the ETag does not match.
      parameters:
        - $ref: '#/components/parameters/customer_id'
        - $ref: '#/components/parameters/order_id'
        - in: header
          name: If-Match
          required: false
          description: >-
            ETag from a prior `GET`. Format: `W/"<version>"`. Returns 412 if
            this does not match the current order version.
          schema:
            type: string
            example: 'W/"3"'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        '204':
          description: Order updated successfully — no response body
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

    delete:
      tags: [Orders]
      summary: Delete Order
      description: |
        Soft-deletes an order by setting its `DeleteDate`.

        **Required permission:** `orders_command:order:delete`
        **Allowed roles:** `admin` only

        On success, publishes an `OrderDeleted` domain event to RabbitMQ.

        **Optimistic concurrency:** Requires `If-Match: W/"<version>"` header.
        Returns `412 Precondition Failed` if the ETag does not match.
      parameters:
        - $ref: '#/components/parameters/customer_id'
        - $ref: '#/components/parameters/order_id'
        - in: header
          name: If-Match
          required: false
          description: ETag from a prior `GET`. Format `W/"<version>"`.
          schema:
            type: string
            example: 'W/"3"'
      responses:
        '204':
          description: Order deleted successfully — no response body
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

    get:
      tags: [Orders]
      summary: Get Order by ID
      description: |
        Returns a single order by its ID.

        **Note:** The ASP.NET route template for this endpoint uses `{id}` as
        the parameter name (vs `{order_id}` for POST/PUT/DELETE), but the URL
        structure is identical — all four methods share this path.

        **Required permission:** `orders_command:order:get`
        **Allowed roles:** `admin`, `customer`

        Customers can only retrieve their own orders (`customer_id` must match
        JWT `sub` claim). Admins can retrieve any order.

        **Optimistic concurrency:** Returns `ETag: W/"<version>"` header
        reflecting the order's current row version. Pass this as `If-Match`
        on subsequent `PUT` or `DELETE` requests.
      parameters:
        - $ref: '#/components/parameters/customer_id'
        - $ref: '#/components/parameters/order_id'
      responses:
        '200':
          description: Order found
          headers:
            ETag:
              description: >-
                Current row version. Format: `W/"<version>"`. Use as
                `If-Match` on `PUT`/`DELETE`.
              schema:
                type: string
                example: 'W/"3"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                id: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
                customer_id: "0abeb947-fd8e-4298-80cc-8a3a38083ad4"
                order_name: "Alice's Order #1"
                shipping_address:
                  firstname: "Alice"
                  lastname: "Smith"
                  email_address: "AliceSmith@email.com"
                  address_line: "Medicinaregatan 20"
                  country: "Sweden"
                  state: "Vastra Gotaland"
                  zip_code: "41390"
                billing_address:
                  firstname: "Alice"
                  lastname: "Smith"
                  email_address: "AliceSmith@email.com"
                  address_line: "Medicinaregatan 20"
                  country: "Sweden"
                  state: "Vastra Gotaland"
                  zip_code: "41390"
                payment:
                  card_name: "Alice Smith"
                  card_number: "XXXXXXXXXXXX1881"
                  expiration: "12/24"
                  cvv: "123"
                  payment_method: 1
                status: "pending"
                order_items:
                  - product_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    quantity: 2
                    price: 79.99
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── List orders for a customer ──────────────────────────────────────────────

  /api/v1/customers/{customer_id}/orders:
    get:
      tags: [Orders]
      summary: Get Orders by Customer ID
      description: |
        Returns a paginated list of orders for a specific customer.

        **Required permission:** `orders_command:order:all-by-customer-id`
        **Allowed roles:** `admin`, `customer`

        Customers can only query using their own `customer_id` (matched against
        JWT `sub` claim). Admins can query any customer's orders.
      parameters:
        - $ref: '#/components/parameters/customer_id'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page_index'
      responses:
        '200':
          description: Paginated list of the customer's orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrdersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── List all orders (admin) ─────────────────────────────────────────────────

  /api/v1/orders/all:
    get:
      tags: [Orders]
      summary: Get All Orders
      description: |
        Returns a paginated list of all orders in the system.

        **Required permission:** `orders_command:order:all`
        **Allowed roles:** `admin` only
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page_index'
      responses:
        '200':
          description: Paginated list of all orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrdersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Search orders by name ───────────────────────────────────────────────────

  /api/v1/orders:
    get:
      tags: [Orders]
      summary: Get Orders by Name
      description: |
        Returns a paginated list of orders matching the given order name.

        **Required permission:** `orders_command:order:all-by-order-name`
        **Allowed roles:** `admin` only

        **Note on parameter name:** The query parameter is `customer_name`
        (matching the `[FromQuery(Name = "customer_name")]` binding in
        `GetOrdersByName/Models.cs`) but it searches on `OrderName`, not the
        customer's name — this is a naming quirk in the source code.
      parameters:
        - name: customer_name
          in: query
          required: true
          description: >-
            Order name to search for (exact match). Despite the parameter name,
            this filters on `OrderName`, not the customer's name.
          schema:
            type: string
            example: "Alice's Order #1"
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page_index'
      responses:
        '200':
          description: Paginated list of matching orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrdersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Health ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [Health]
      summary: Health Check
      description: |
        Returns the health status of the service and its PostgreSQL dependency.
        No authentication required.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "Healthy"
                results:
                  database:
                    status: "Healthy"
                    description: "PostgreSQL connection OK"
        '503':
          description: Service or dependency is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

# ── Components ────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token issued by IdentityServer at `https://localhost:5007`.

        **Required claims:**
        - `aud`: must include `orders_command`
        - `permissions`: array containing the required policy string
        - `sub`: user GUID (used to identify the caller for ownership checks)
        - `role`: `admin` or `customer`

        **Get a token (curl — password grant):**
        ```
        curl -X POST https://localhost:5007/connect/token \
          -d grant_type=password \
          -d client_id=postman-client-password \
          -d username=AliceSmith@email.com \
          -d password=Pass123$ \
          -d "scope=openid profile orders_command"
        ```

  parameters:
    customer_id:
      name: customer_id
      in: path
      required: true
      description: >-
        Customer's unique identifier. For the `customer` role, must match the
        `sub` claim in the Bearer token.
      schema:
        type: string
        format: uuid
        example: "0abeb947-fd8e-4298-80cc-8a3a38083ad4"

    order_id:
      name: order_id
      in: path
      required: true
      description: The order's unique identifier (ULID or UUID, supplied by the caller).
      schema:
        type: string
        example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"

    page_size:
      name: page_size
      in: query
      required: false
      description: Number of items per page. Defaults to 10.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
        example: 10

    page_index:
      name: page_index
      in: query
      required: false
      description: Zero-based page index. Defaults to 0.
      schema:
        type: integer
        minimum: 0
        default: 0
        example: 0

  responses:
    BadRequest:
      description: Bad Request — validation failed on request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Unauthorized:
      description: Unauthorized — missing or invalid Bearer token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://tools.ietf.org/html/rfc7235#section-3.1"
            title: "Unauthorized"
            status: 401

    Forbidden:
      description: |
        Forbidden — token is valid but the `permissions` claim does not include
        the required policy, or the customer's `sub` does not match `customer_id`.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://tools.ietf.org/html/rfc7231#section-6.5.3"
            title: "Forbidden"
            status: 403

    NotFound:
      description: Not Found — the requested order does not exist
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://tools.ietf.org/html/rfc7231#section-6.5.4"
            title: "Not Found"
            status: 404

    PreconditionFailed:
      description: |
        Precondition Failed — the `If-Match` ETag does not match the current
        order version. Re-fetch the order to get the current ETag.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://tools.ietf.org/html/rfc7232#section-4.2"
            title: "Precondition Failed"
            status: 412

  schemas:

    # ── Address ───────────────────────────────────────────────────────────────
    Address:
      type: object
      properties:
        firstname:
          type: string
          example: "Alice"
        lastname:
          type: string
          example: "Smith"
        email_address:
          type: string
          format: email
          example: "AliceSmith@email.com"
        address_line:
          type: string
          example: "Medicinaregatan 20"
        country:
          type: string
          example: "Sweden"
        state:
          type: string
          example: "Vastra Gotaland"
        zip_code:
          type: string
          example: "41390"

    # ── Payment ───────────────────────────────────────────────────────────────
    Payment:
      type: object
      properties:
        card_name:
          type: string
          example: "Alice Smith"
        card_number:
          type: string
          example: "XXXXXXXXXXXX1881"
        expiration:
          type: string
          example: "12/24"
        cvv:
          type: string
          example: "123"
        payment_method:
          type: integer
          description: Payment method type code (e.g. 1 = credit card).
          example: 1

    # ── Order Item ────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        quantity:
          type: integer
          minimum: 1
          example: 2
        price:
          type: number
          format: decimal
          example: 79.99

    # ── Order Status ──────────────────────────────────────────────────────────
    OrderStatus:
      type: string
      description: |
        Current lifecycle status of the order.
        - `pending` — order created, awaiting fulfillment
        - `completed` — order fulfilled
        - `cancelled` — cancelled before fulfilment
      enum: [pending, completed, cancelled]
      example: "pending"

    # ── Full Order (read response) ────────────────────────────────────────────
    Order:
      type: object
      properties:
        id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        customer_id:
          type: string
          format: uuid
          description: Matches the `sub` claim of the customer's JWT.
          example: "0abeb947-fd8e-4298-80cc-8a3a38083ad4"
        order_name:
          type: string
          example: "Alice's Order #1"
        status:
          $ref: '#/components/schemas/OrderStatus'
        shipping_address:
          $ref: '#/components/schemas/Address'
        billing_address:
          $ref: '#/components/schemas/Address'
        payment:
          $ref: '#/components/schemas/Payment'
        order_items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    # ── Request schemas ───────────────────────────────────────────────────────
    CreateOrderRequest:
      type: object
      description: >-
        Request body for `POST /api/v1/customers/{customer_id}/orders/{order_id}`.
        `customer_id` and `order_id` come from route parameters, not the body.
      properties:
        order_name:
          type: string
          example: "Alice's Order #1"
        shipping_address:
          $ref: '#/components/schemas/Address'
        billing_address:
          $ref: '#/components/schemas/Address'
        payment:
          $ref: '#/components/schemas/Payment'
        order_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'

    UpdateOrderRequest:
      type: object
      description: >-
        Request body for `PUT /api/v1/customers/{customer_id}/orders/{order_id}`.
        All fields are optional — only provided fields are updated.
        `customer_id` and `order_id` come from route parameters.
      properties:
        order_name:
          type: string
          example: "Alice's Order #1 (updated)"
        status:
          $ref: '#/components/schemas/OrderStatus'
        shipping_address:
          $ref: '#/components/schemas/Address'
        billing_address:
          $ref: '#/components/schemas/Address'
        payment:
          $ref: '#/components/schemas/Payment'
        order_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'

    # ── Response schemas ──────────────────────────────────────────────────────
    CreateOrderResponse:
      type: object
      properties:
        order_id:
          type: string
          description: The newly created order's ID.
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"

    OrderResponse:
      type: object
      description: Response for `GET /api/v1/customers/{customer_id}/orders/{order_id}`.
      allOf:
        - $ref: '#/components/schemas/Order'

    PaginatedItems:
      type: object
      description: >-
        Pagination wrapper from `eshop.Shared.Pagination.PaginatedItems<T>`.
      properties:
        page_index:
          type: integer
          description: Zero-based current page index.
          example: 0
        page_size:
          type: integer
          description: Number of items per page.
          example: 10
        count:
          type: integer
          format: int64
          description: Total number of matching records.
          example: 42
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'

    PaginatedOrdersResponse:
      type: object
      description: >-
        Top-level wrapper for all paginated list endpoints. The `orders` key
        contains the full `PaginatedItems` object including pagination metadata.
      properties:
        orders:
          $ref: '#/components/schemas/PaginatedItems'

    # ── Health ────────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [Healthy, Degraded, Unhealthy]
          example: "Healthy"
        results:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                enum: [Healthy, Degraded, Unhealthy]
              description:
                type: string

    # ── Problem Details ───────────────────────────────────────────────────────
    ProblemDetails:
      type: object
      description: RFC 7807 Problem Details. Returned by `UseProblemDetailsResponseExceptionHandler` middleware.
      properties:
        type:
          type: string
          format: uri
          example: "https://tools.ietf.org/html/rfc7231#section-6.5.1"
        title:
          type: string
          example: "Bad Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "One or more validation errors occurred."
        instance:
          type: string
          example: "/api/v1/orders"
        errors:
          type: object
          description: Field-level validation errors (present on 400 responses).
          additionalProperties:
            type: array
            items:
              type: string
          example:
            order_items: ["Order must contain at least one item."]
