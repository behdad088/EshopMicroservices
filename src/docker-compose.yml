services:
  catalogDb:
    image: postgres:16-alpine
    networks:
      - data

  basketDb:
    image: postgres:16-alpine
    networks:
      - data

  identityDb:
    image: postgres:16-alpine
    networks:
      - data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - data

  distributedCache:
    image: redis:alpine
    networks:
      - data

  order.command.db:
    image: postgres:16-alpine
    networks:
      - data

  order.query.db:
    image: postgres:16-alpine
    networks:
      - data

  catalog.api:
    image: ${DOCKER_REGISTRY-}catalog.api
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.API/Dockerfile
    networks:
      - backend
      - data
      - observability

  basket.api:
    image: ${DOCKER_REGISTRY-}basket.api
    build:
      context: .
      dockerfile: Services/Basket/Basket.API/Dockerfile
    networks:
      - backend
      - data
      - observability

  discount.grpc:
    image: ${DOCKER_REGISTRY-}discount.grpc
    build:
      context: .
      dockerfile: Services/Discount/Discount.Grpc/Dockerfile
    networks:
      - backend
      - observability

  order.command.api:
    image: ${DOCKER_REGISTRY-}order.command.api
    build:
      context: .
      dockerfile: Services/Order.Command/Order.Command.API/Dockerfile
    networks:
      - backend
      - data
      - observability

  identity.api:
    image: ${DOCKER_REGISTRY-}identity.api
    build:
      context: .
      dockerfile: Services/Identity/Identity.API/Dockerfile
    networks:
      - backend
      - data
      - observability

  order.query.eventprocessor:
    image: ${DOCKER_REGISTRY-}order.query.eventprocessor
    build:
      context: .
      dockerfile: Services/Order.Query/Order.Query.EventProcessor/Dockerfile
    networks:
      - data
      - observability

  order.query.api:
    image: ${DOCKER_REGISTRY-}order.query.api
    build:
      context: .
      dockerfile: Services/Order.Query/Order.Query.API/Dockerfile
    networks:
      - backend
      - data
      - observability

  api.gateway:
    image: ${DOCKER_REGISTRY-}api.gateway
    build:
      context: .
      dockerfile: Services/ApiGateways/Dockerfile
    networks:
      - backend
      - observability

  prometheus:
    image: prom/prometheus:v2.48.1
    networks:
      - observability

  loki:
    image: grafana/loki:2.9.3
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    networks:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:1.52
    networks:
      - observability

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.27
    networks:
      - observability

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.27
    networks:
      - observability

networks:
  backend:
    driver: bridge
  data:
    driver: bridge
  observability:
    driver: bridge

volumes:
  postgres_catalog_db:
  postgres_order_query_db:
  postgres_basket_db:
  postgres_order_command_db:
  postgres_identity_db:
  rabbitmq_data:
  elasticsearch-data:
