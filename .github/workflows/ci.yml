# Single CI entry point for all microservices.
#
# 1. `detect` job uses dorny/paths-filter to determine which services changed.
# 2. Each service job runs only when its files (or shared/Building Blocks) changed,
#    or when the workflow is dispatched manually with `force_all = true`.
# 3. Service jobs delegate to the reusable `_build-push.yml` workflow.
#
# Images are pushed only on pushes to `main` (never on pull requests).

name: CI

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Build every service regardless of changed paths'
        type: boolean
        default: false
      image_tag_suffix:
        description: 'Optional suffix appended to image tags (e.g. "-hotfix1")'
        type: string
        default: ''
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write     # PR comment with image tags (in _build-push.yml)
  security-events: write   # Trivy SARIF upload (in _build-push.yml)
  checks: write            # dorny/test-reporter (in _build-push.yml)
  packages: write          # push to ghcr.io (in _build-push.yml)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shared: ${{ steps.changes.outputs.shared }}
      basket: ${{ steps.changes.outputs.basket }}
      catalog: ${{ steps.changes.outputs.catalog }}
      discount: ${{ steps.changes.outputs.discount }}
      identity: ${{ steps.changes.outputs.identity }}
      order_command: ${{ steps.changes.outputs.order_command }}
      order_query_api: ${{ steps.changes.outputs.order_query_api }}
      order_query_eventprocessor: ${{ steps.changes.outputs.order_query_eventprocessor }}
      api_gateways: ${{ steps.changes.outputs.api_gateways }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect path changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'src/Services/Shared/**'
              - 'src/BuildingBlocks/**'
              - 'src/Directory.Packages.props'
              - 'src/eshop-microservices.sln'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_build-push.yml'
            basket:
              - 'src/Services/Basket/**'
            catalog:
              - 'src/Services/Catalog/**'
            discount:
              - 'src/Services/Discount/**'
            identity:
              - 'src/Services/Identity/**'
            order_command:
              - 'src/Services/Order.Command/**'
            order_query_api:
              - 'src/Services/Order.Query/Order.Query.API/**'
              - 'src/Services/Order.Query/Order.Query.API.IntegrationTests/**'
              - 'src/Services/Order.Query/Order.Query/**'
              - 'src/Services/Order.Query/Order.Query.Data/**'
            order_query_eventprocessor:
              - 'src/Services/Order.Query/Order.Query.EventProcessor/**'
              - 'src/Services/Order.Query/Order.Query.EventProcessor.IntegrationTests/**'
              - 'src/Services/Order.Query/Order.Query/**'
              - 'src/Services/Order.Query/Order.Query.Data/**'
            api_gateways:
              - 'src/Services/ApiGateways/**'

  basket:
    name: Basket API
    needs: detect
    if: |
      needs.detect.outputs.basket == 'true' ||
      needs.detect.outputs.shared == 'true' ||
      github.event.inputs.force_all == 'true'
    uses: ./.github/workflows/_build-push.yml
    with:
      service: eshop-basket-api
      image_name: eshop-basket.api
      project_path: src/Services/Basket/Basket.API
      test_path: src/Services/Basket/Basket.API.IntegrationTests
      push_image: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      image_tag_suffix: ${{ github.event.inputs.image_tag_suffix }}
    secrets: inherit

  catalog:
    name: Catalog API
    needs: detect
    if: |
      needs.detect.outputs.catalog == 'true' ||
      needs.detect.outputs.shared == 'true' ||
      github.event.inputs.force_all == 'true'
    uses: ./.github/workflows/_build-push.yml
    with:
      service: eshop-catalog-api
      image_name: eshop-catalog.api
      project_path: src/Services/Catalog/Catalog.API
      test_path: src/Services/Catalog/Catalog.API.IntegrationTests
      push_image: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      image_tag_suffix: ${{ github.event.inputs.image_tag_suffix }}
    secrets: inherit

  discount:
    name: Discount gRPC
    needs: detect
    if: |
      needs.detect.outputs.discount == 'true' ||
      needs.detect.outputs.shared == 'true' ||
      github.event.inputs.force_all == 'true'
    uses: ./.github/workflows/_build-push.yml
    with:
      service: eshop-discount-grpc
      image_name: eshop-discount.grpc
      project_path: src/Services/Discount/Discount.Grpc
      test_path: src/Services/Discount/Discount.Grpc.IntegrationTests
      push_image: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      image_tag_suffix: ${{ github.event.inputs.image_tag_suffix }}
    secrets: inherit

  identity:
    name: Identity API
    needs: detect
    if: |
      needs.detect.outputs.identity == 'true' ||
      needs.detect.outputs.shared == 'true' ||
      github.event.inputs.force_all == 'true'
    uses: ./.github/workflows/_build-push.yml
    with:
      service: identity-api
      image_name: identity.api
      project_path: src/Services/Identity/Identity.API
      test_path: src/Services/Identity/Identity.API.Tests
      push_image: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      image_tag_suffix: ${{ github.event.inputs.image_tag_suffix }}
    secrets: inherit

  order-command:
    name: Order Command API
    needs: detect
    if: |
      needs.detect.outputs.order_command == 'true' ||
      needs.detect.outputs.shared == 'true' ||
      github.event.inputs.force_all == 'true'
    uses: ./.github/workflows/_build-push.yml
    with:
      service: order-command-api
      image_name: order-command.api
      project_path: src/Services/Order.Command/Order.Command.API
      test_path: src/Services/Order.Command/Order.Command.API.IntegrationTests
      push_image: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      image_tag_suffix: ${{ github.event.inputs.image_tag_suffix }}
    secrets: inherit

  order-query-api:
    name: Order Query API
    needs: detect
    if: |
      needs.detect.outputs.order_query_api == 'true' ||
      needs.detect.outputs.shared == 'true' ||
      github.event.inputs.force_all == 'true'
    uses: ./.github/workflows/_build-push.yml
    with:
      service: order-query-api
      image_name: order-query-api
      project_path: src/Services/Order.Query/Order.Query.API
      test_path: src/Services/Order.Query/Order.Query.API.IntegrationTests
      push_image: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      image_tag_suffix: ${{ github.event.inputs.image_tag_suffix }}
    secrets: inherit

  order-query-eventprocessor:
    name: Order Query Event Processor
    needs: detect
    if: |
      needs.detect.outputs.order_query_eventprocessor == 'true' ||
      needs.detect.outputs.shared == 'true' ||
      github.event.inputs.force_all == 'true'
    uses: ./.github/workflows/_build-push.yml
    with:
      service: order-query-eventprocessor
      image_name: order-query-eventprocessor
      project_path: src/Services/Order.Query/Order.Query.EventProcessor
      test_path: src/Services/Order.Query/Order.Query.EventProcessor.IntegrationTests
      push_image: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      image_tag_suffix: ${{ github.event.inputs.image_tag_suffix }}
    secrets: inherit

  api-gateways:
    name: API Gateways
    needs: detect
    if: |
      needs.detect.outputs.api_gateways == 'true' ||
      needs.detect.outputs.shared == 'true' ||
      github.event.inputs.force_all == 'true'
    uses: ./.github/workflows/_build-push.yml
    with:
      service: api-gateways
      image_name: api-gateways
      project_path: src/Services/ApiGateways
      push_image: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      image_tag_suffix: ${{ github.event.inputs.image_tag_suffix }}
    secrets: inherit

  e2e:
    name: E2E — shopping journey
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-e2e-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-e2e-
            ${{ runner.os }}-nuget-

      - name: Restore E2E test project
        run: dotnet restore src/Services/E2ETests/E2ETests.csproj

      - name: Build E2E test project
        run: dotnet build src/Services/E2ETests/E2ETests.csproj --no-restore --configuration Release

      - name: Install Playwright runtime
        run: pwsh src/Services/E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start services
        working-directory: src
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build -d

      - name: Wait for services to be healthy
        working-directory: src
        run: bash scripts/wait-for-services.sh

      - name: Run E2E tests
        run: |
          dotnet test src/Services/E2ETests/E2ETests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=e2e-results.trx" \
            --logger GitHubActions \
            --results-directory ./TestResults

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E tests
          path: TestResults/**/e2e-results.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: TestResults/
          retention-days: 7

      - name: Collect Docker logs on failure
        if: failure()
        working-directory: src
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs --no-color > ../docker-logs.txt 2>&1

      - name: Upload Docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 3

      - name: Tear down services
        if: always()
        working-directory: src
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v

  # Aggregate gate so branch protection only needs to require one check.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs:
      - detect
      - basket
      - catalog
      - discount
      - identity
      - order-command
      - order-query-api
      - order-query-eventprocessor
      - api-gateways
      - e2e
    if: always()
    steps:
      - name: Verify all required jobs succeeded or were skipped
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS"
          echo "$RESULTS" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          bad = [k for k, v in data.items() if v.get("result") not in ("success", "skipped")]
          if bad:
              print(f"Failing jobs: {bad}")
              sys.exit(1)
          print("All jobs succeeded or were skipped.")
          '
