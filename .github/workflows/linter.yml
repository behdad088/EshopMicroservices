# Super Linter — runs on every PR so reviewers see lint feedback inline.

name: Lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  statuses: write
  pull-requests: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint code base
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full git history so super-linter can diff against the base branch.
          fetch-depth: 0

      - name: Run Super Linter
        uses: super-linter/super-linter@v7
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          VALIDATE_EDITORCONFIG: true
          LINTER_RULES_PATH: /
          EDITORCONFIG_FILE_NAME: .editorconfig
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
