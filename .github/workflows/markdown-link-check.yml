# Checks every link in every Markdown file (README.md, /docs/**, etc.).
#
# - On pull requests that touch *.md the job FAILS on broken links so reviewers
#   see the problem inline.
# - On the weekly schedule the job does NOT fail; instead it opens (or updates)
#   a tracking issue tagged "broken-links". This way link rot in third-party
#   sites doesn't randomly red-X your build, but you still find out about it.

name: Markdown link check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-link-check.yml'
  schedule:
    - cron: '0 8 * * 1'   # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write          # only used by the scheduled "open issue" step
  pull-requests: read

concurrency:
  group: link-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lychee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee link check
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --cache + max-cache-age make repeated runs cheap and avoid hammering
          # remote servers. 429 (rate-limited) is treated as success since GitHub
          # itself issues 429s to anonymous traffic.
          args: >-
            --no-progress
            --cache
            --max-cache-age 7d
            --accept 200,206,429
            --exclude-mail
            --exclude-path './**/bin/**'
            --exclude-path './**/obj/**'
            './**/*.md'
          fail: ${{ github.event_name == 'pull_request' }}
          output: ./lychee-report.md

      - name: Open or update tracking issue (scheduled runs only)
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Broken links detected by lychee'
          content-filepath: ./lychee-report.md
          labels: |
            docs
            broken-links
